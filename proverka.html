<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Проверка первичного усвоения</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            max-width: 900px;
            width: 100%;
            background: #fffef7;
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            padding: 2rem;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.25rem 0;
            color: #2c3e2f;
            border-bottom: 3px solid #f3b33d;
            padding-bottom: 12px;
            text-align: center;
        }
        .question-area {
            background: #fff5e8;
            border-radius: 48px;
            padding: 1.8rem;
            margin: 1.5rem 0;
            text-align: center;
        }
        .question-text {
            font-size: 2rem;
            font-weight: 700;
            margin: 0.5rem 0 1rem;
            color: #2c3e2f;
        }
        .timer-display {
            font-family: monospace;
            font-size: 4rem;
            font-weight: 800;
            background: #1e293b;
            color: #facc15;
            display: inline-block;
            padding: 0.2rem 1.5rem;
            border-radius: 60px;
            margin: 15px 0;
            letter-spacing: 4px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        button {
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-start {
            background: #2e7d32;
            color: white;
        }
        .btn-start:hover {
            background: #1f6b23;
        }
        .answers-block {
            background: #e6f4ea;
            border-radius: 40px;
            padding: 1.2rem;
            margin-top: 1.5rem;
            text-align: left;
            border-left: 8px solid #2e7d32;
        }
        .answers-block h3 {
            margin-top: 0;
            color: #1e5a1e;
        }
        .answers-block p {
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }
        .hidden {
            display: none;
        }
        .status {
            font-size: 1rem;
            color: #b97f2e;
            margin-top: 10px;
        }
        .progress {
            font-weight: bold;
            margin: 10px 0;
            color: #4a6a3b;
        }
        @media (max-width: 650px) {
            .quiz-container { padding: 1rem; }
            .question-text { font-size: 1.5rem; }
            .timer-display { font-size: 2.5rem; }
            button { padding: 8px 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>✍️ Проверка первичного усвоения</h1>
    <div id="questionArea" class="question-area">
        <div class="progress" id="progressText">Вопрос 1 из 3</div>
        <div class="question-text" id="questionText">Подготовка...</div>
        <div class="timer-display" id="timerDisplay">10</div>
        <div class="button-group">
            <button id="startBtn" class="btn-start">▶ Старт (10 сек)</button>
        </div>
        <div class="status" id="statusMsg">Напишите ответ на листочке. Нажмите «Старт».</div>
    </div>

    <div id="finalAnswersBlock" class="answers-block hidden">
        <h3>✅ Правильные ответы (для самопроверки):</h3>
        <p><strong>Вопрос 1:</strong> пиксель (или пиксели)</p>
        <p><strong>Вопрос 2:</strong> слой (или слои)</p>
        <p><strong>Вопрос 3:</strong> Krita</p>
        <p>📌 Поставьте себе «+» за каждый правильный ответ.</p>
    </div>
</div>

<script>
    const questions = [
        "Как называются маленькие точки, из которых состоит растровое изображение?",
        "Как называются «прозрачные плёнки» в графическом редакторе, на которых рисуются разные части картинки?",
        "В какой программе мы сегодня работали?"
    ];

    let currentIndex = 0;
    let timerInterval = null;
    let timeLeft = 10;
    let isActive = false;
    let isFinished = false;

    const questionTextEl = document.getElementById('questionText');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const statusMsg = document.getElementById('statusMsg');
    const progressText = document.getElementById('progressText');
    const questionArea = document.getElementById('questionArea');
    const finalBlock = document.getElementById('finalAnswersBlock');

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        isActive = false;
    }

    function loadQuestion(index) {
        if (index >= questions.length) {
            finishTest();
            return;
        }
        questionTextEl.innerText = questions[index];
        timerDisplay.innerText = "10";
        timeLeft = 10;
        progressText.innerText = `Вопрос ${index+1} из ${questions.length}`;
        statusMsg.innerHTML = "📝 Напишите ответ на листочке. Нажмите «Старт».";
        startBtn.disabled = false;
        startBtn.innerText = "▶ Старт (10 сек)";
        stopTimer();
        isActive = false;
    }

    function startTimer() {
        if (isActive || isFinished) return;
        isActive = true;
        startBtn.disabled = true;
        statusMsg.innerHTML = "⏳ Идёт время, пишите ответ...";
        timeLeft = 10;
        timerDisplay.innerText = timeLeft;
        timerInterval = setInterval(() => {
            if (timeLeft <= 1) {
                timerDisplay.innerText = 0;
                stopTimer();
                statusMsg.innerHTML = "⏰ Время вышло! Переход к следующему вопросу...";
                setTimeout(() => {
                    currentIndex++;
                    loadQuestion(currentIndex);
                }, 1000);
            } else {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
            }
        }, 1000);
    }

    function finishTest() {
        isFinished = true;
        questionArea.classList.add('hidden');
        finalBlock.classList.remove('hidden');
    }

    startBtn.addEventListener('click', startTimer);
    loadQuestion(0);
</script>
</body>
</html>
